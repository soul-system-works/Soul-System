  <title
     id="title1">Soul System Architecture</title>
  <desc
     id="desc1">The Universe contains everything. Inside the Universe, the Body inhabits the system and bears responsibility for the whole. The Soul (top) holds timeless philosophy; the Witness (left) observes and records; the Council (centre) synthesises across time; the Judge (right) decides in the moment. The Council is a chamber of voices represented symbolically as twelve members around the circle, grouped into three core tiers by colour family: Magistrates (amber), Tribunes (green), Censors (blue). Shade variation within each family represents individual members. The Panel of Experts (the Consults tier) sits outside the Council, parallel to the Witness, summoned when domain authority is required — like the Witness it is a factual source that informs but does not decide. The Hands (produce the work) sit under the Body's authority, directed by the Judge and evaluated by the Council.</desc>
